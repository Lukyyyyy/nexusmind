name: nexusmind

services:
  mysql:
    container_name: mysql
    image: mysql:8
    restart: always
    ports:
      - "${MYSQL_HOST_PORT:-13306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-nexusmind-local}
      MYSQL_DATABASE: nexusmind
    volumes:
      - mysql-data:/var/lib/mysql
      - /data/docker/mysql/conf:/etc/mysql/conf.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --explicit_defaults_for_timestamp=true --lower_case_table_names=1
    healthcheck:
      start_period: 5s
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  minio:
    container_name: minio
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: always
    ports:
      - "${MINIO_API_HOST_PORT:-19000}:19000"
      - "${MINIO_CONSOLE_HOST_PORT:-19001}:19001"
    volumes:
      - minio-data:/data
      - /data/docker/minio/config:/root/.minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nexusmind-local}
    command: server /data --console-address ":19001" -address ":19000"

  redis:
    image: redis
    container_name: redis
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
      - /data/docker/redis:/logs
    healthcheck:
      start_period: 5s
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --bind 0.0.0.0 --port 6379 --requirepass ${REDIS_PASSWORD:-nexusmind-local} --appendonly yes

  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: kafka       # 如果需要按照新的命名规则，请改为 nexusmind_kafka
    restart: always
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
      - "${KAFKA_CONTROLLER_HOST_PORT:-9093}:9093"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093

      # 监听器配置
      - KAFKA_CFG_LISTENERS=CONTROLLER://:9093,PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

    volumes:
      - kafka-data:/bitnami/kafka
    command:
      - sh
      - -c
      - |
        # 启动 Kafka（使用 bitnami 完整初始化流程）
        /opt/bitnami/scripts/kafka/run.sh &

        # 等待 Kafka 完全启动（更可靠的检测方式）
        echo "Waiting for Kafka to start..."
        while ! kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null; do
          sleep 2
        done

        # 创建第一个主题（忽略已存在的错误）
        echo "Creating topic: file-processing"
        kafka-topics.sh --create \
          --bootstrap-server localhost:9092 \
          --replication-factor 1 \
          --partitions 1 \
          --topic file-processing 2>/dev/null || true

        # 创建第二个主题 vectorization
        echo "Creating topic: vectorization"
        kafka-topics.sh --create \
          --bootstrap-server localhost:9092 \
          --replication-factor 1 \
          --partitions 1 \
          --topic vectorization 2>/dev/null || true
        # 保持容器运行
        tail -f /dev/null
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  es:
    image: elasticsearch:8.10.4
    container_name: es
    restart: always
    ports:
      - "${ELASTICSEARCH_HOST_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    environment:
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD:-nexusmind-local}
      - node.name=nexusmind-es01
      - discovery.type=single-node
      - xpack.license.self_generated.type=basic
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - cluster.name=nexusmind-es-cluster

      # 内存配置 (根据可用RAM调整)
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    deploy:
      resources:
        limits:
          memory: 2g
    command: >
      bash -c "
      if ! elasticsearch-plugin list | grep -q 'analysis-ik'; then
        echo 'Installing analysis-ik plugin...';
        elasticsearch-plugin install --batch https://release.infinilabs.com/analysis-ik/stable/elasticsearch-analysis-ik-8.10.4.zip;
      else
        echo 'analysis-ik plugin already installed.';
      fi;
      /usr/local/bin/docker-entrypoint.sh
      "
    healthcheck:
      test: [ 'CMD', 'curl', '-s', 'http://localhost:9200/_cluster/health?pretty' ]
      interval: 30s
      timeout: 10s
      retries: 3

  mineru-api:
    image: mineru:latest
    build:
      context: ./mineru
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${MINERU_APT_MIRROR:-https://mirrors.aliyun.com/ubuntu}
        HTTP_PROXY: ${MINERU_HTTP_PROXY:-}
        HTTPS_PROXY: ${MINERU_HTTPS_PROXY:-}
    container_name: mineru-api
    restart: "on-failure:3"
    profiles:
      - mineru
    ports:
      - "${MINERU_API_HOST_PORT:-18000}:8000"
    environment:
      MINERU_MODEL_SOURCE: ${MINERU_MODEL_SOURCE:-local}
      MINERU_API_ENABLE_FASTAPI_DOCS: ${MINERU_API_ENABLE_FASTAPI_DOCS:-1}
      MINERU_MODEL_DOWNLOAD_SOURCE: ${MINERU_MODEL_DOWNLOAD_SOURCE:-huggingface}
      MINERU_MODEL_DOWNLOAD_TYPE: ${MINERU_MODEL_DOWNLOAD_TYPE:-pipeline}
      MINERU_SKIP_MODEL_DOWNLOAD: ${MINERU_SKIP_MODEL_DOWNLOAD:-false}
      MINERU_HTTP_PROXY: ${MINERU_HTTP_PROXY:-}
      MINERU_HTTPS_PROXY: ${MINERU_HTTPS_PROXY:-}
      MINERU_NO_PROXY: ${MINERU_NO_PROXY:-localhost,127.0.0.1}
    volumes:
      - mineru-output:/app/output
      - mineru-cache:/root/.cache
    command:
      - mineru-api
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/openapi.json || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30m

volumes:
  redis-data:
  mysql-data:
  minio-data:
  kafka-data:
  es-data:
  mineru-output:
  mineru-cache:
